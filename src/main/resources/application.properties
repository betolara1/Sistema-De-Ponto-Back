spring.application.name=Ponto

# Chave secreta (Obrigatório)
jwt.secret-key=minha_chave_secreta_super_longa_e_segura_32_chars

# Tempo de expiração (Opcional - Padrão 24h)
jwt.expiration-time=43200000 

# Rotas públicas que NÃO precisam de token (Opcional mas muito recomendado)
jwt.excluded-paths=/auth/login, /public/**, /swagger-ui/**


# Configurações de Conexão com o Banco de Dados (Exemplo com PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_ponto
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuração do Hibernate: Desative a criação automática de tabelas.
# Como agora estamos usando o Flyway, o Hibernate não deve alterar as tabelas (apenas validar).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Configurações do Flyway
spring.flyway.enabled=true
# Cria o histórico a partir do estado atual caso o banco já possua dados legados
spring.flyway.baseline-on-migrate=true
